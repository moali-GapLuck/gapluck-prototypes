<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GapLuck - SearchBar Component</title>
  <meta name="description" content="Isolated view of the SearchBar component.">
  <link rel="stylesheet" href="../styles/tokens.css">
  <link rel="stylesheet" href="../styles/reset.css">
  <link rel="stylesheet" href="../styles/base.css">
  <link rel="stylesheet" href="../styles/layout.css">
  <link rel="stylesheet" href="../styles/utilities.css">
  <link rel="stylesheet" href="../styles/components/search-bar.css">
  <link rel="stylesheet" href="../styles/components/search-autocomplete.css">
  <style>
    .ag-back-link {
      display: block;
      margin-bottom: var(--space-4);
    }
  </style>
</head>
<body>
  <div class="ag-container ag-p-6">
    <a href="../index.html" class="ag-back-link">← Back to Hub</a>
    
    <div class="ag-search-bar">
      <span class="ag-search-bar__icon" aria-hidden="true">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"></circle>
          <path d="m21 21-4.34-4.34"></path>
        </svg>
      </span>
      <input type="search" placeholder="Search by product name, brand, or barcode" class="ag-search-bar__input" aria-label="Search by product name, brand, or barcode">
    </div>
  </div>
  <script src="../scripts/components/search-autocomplete.js"></script>
</body>
</html>
