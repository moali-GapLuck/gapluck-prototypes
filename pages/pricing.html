<!DOCTYPE html>
<html lang="en" data-theme="dark" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GapLuck - Pricing Packages</title>
  <meta name="description" content="Transparent subscription packages. Upgrade to Premium for global price alerts and unlimited comparisons.">
  <script src="../scripts/data/theme.js"></script>
  <link rel="stylesheet" href="../styles/tokens.css">
  <link rel="stylesheet" href="../styles/reset.css">
  <link rel="stylesheet" href="../styles/base.css">
  <link rel="stylesheet" href="../styles/layout.css">
  <link rel="stylesheet" href="../styles/utilities.css">
  <link rel="stylesheet" href="../styles/components/buttons.css">
  <link rel="stylesheet" href="../styles/components/badge.css">
  <link rel="stylesheet" href="../styles/components/navigation.css">
  <link rel="stylesheet" href="../styles/components/footer.css">
  <link rel="stylesheet" href="../styles/components/toast.css">
  <link rel="stylesheet" href="../styles/components/search-autocomplete.css">
  <link rel="stylesheet" href="../styles/components/pricing-tier-card.css">
  <style>
    .ag-pricing-hero {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      margin-top: var(--space-24);
      margin-bottom: var(--space-12);
      width: 100%;
    }
    .ag-pricing-hero__eyebrow {
      font-size: var(--text-xs);
      font-weight: var(--font-weight-semibold);
      color: var(--color-positive);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: var(--space-3);
      text-align: center;
    }
    .ag-pricing-hero__title {
      font-family: var(--font-family-heading);
      font-size: var(--text-4xl);
      font-weight: var(--font-weight-extrabold);
      color: var(--color-text-primary);
      margin-bottom: var(--space-4);
    }
    .ag-pricing-hero__subtitle {
      font-size: var(--text-base);
      color: var(--color-text-secondary);
      max-width: none;
      margin-inline: auto;
      white-space: nowrap;
    }
    .ag-pricing-container-wrapper {
      margin-bottom: var(--space-24);
      display: flex;
      justify-content: center;
      width: 100%;
    }
    @media (max-width: 768px) {
      .ag-pricing-hero__subtitle {
        white-space: normal;
        max-width: 60ch;
      }
    }
  </style>
</head>
<body>

  <main class="ag-container ag-p-6">
    <div class="ag-pricing-hero">
      <p class="ag-pricing-hero__eyebrow" id="page-eyebrow">Pricing</p>
      <h1 class="ag-pricing-hero__title" id="page-title">Choose Your Plan</h1>
      <p class="ag-pricing-hero__subtitle" id="page-subtitle">Simple, transparent subscription packages. Access the cheapest prices worldwide.</p>
    </div>

    <div class="ag-pricing-container-wrapper">
      <div data-pricing-container></div>
    </div>
  </main>

  <!-- Load dependencies -->
  <script src="../scripts/data/i18n.js"></script>
  <script src="../scripts/data/currency.js"></script>
  <script src="../scripts/components/toast.js"></script>
  <script src="../scripts/components/search-autocomplete.js"></script>
  <script src="../scripts/components/navbar.js"></script>
  <script src="../scripts/components/pricing-tier-card.js"></script>
  <script src="../scripts/components/footer.js"></script>

  <script>
    (function() {
      'use strict';
      const pageTranslations = {
        en: {
          eyebrow: 'Pricing',
          title: 'Choose Your Plan',
          subtitle: 'Simple, transparent subscription packages. Access the cheapest prices worldwide.'
        },
        tr: {
          eyebrow: 'Fiyatlandırma',
          title: 'Planınızı Seçin',
          subtitle: 'Basit, şeffaf abonelik paketleri. Dünya genelindeki en ucuz fiyatlara erişin.'
        },
        ar: {
          eyebrow: 'الأسعار',
          title: 'اختر خطتك',
          subtitle: 'باقات اشتراك بسيطة وشفافة. احصل على أرخص الأسعار حول العالم.'
        }
      };

      function updatePageStrings() {
        const lang = document.documentElement.getAttribute('lang') || 'en';
        const t = pageTranslations[lang] || pageTranslations.en;
        const eyebrowEl = document.getElementById('page-eyebrow');
        const titleEl = document.getElementById('page-title');
        const subtitleEl = document.getElementById('page-subtitle');
        if (eyebrowEl) eyebrowEl.textContent = t.eyebrow;
        if (titleEl) titleEl.textContent = t.title;
        if (subtitleEl) subtitleEl.textContent = t.subtitle;
      }

      // Initialize
      updatePageStrings();

      // Sync on language change
      window.addEventListener('gl-language-change', updatePageStrings);
    })();
  </script>
</body>
</html>
